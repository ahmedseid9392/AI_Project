{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Predict Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Make a Student Performance Prediction</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <button type="submit" class="btn btn-success">Run Prediction</button>
                        <a href="{% url 'predictions:model_info' %}" class="btn btn-outline-secondary">Model Info</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
